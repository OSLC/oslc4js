<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <title>BMM Relationships — typed connections between BMM concepts</title>
  <desc>Typed relationships among Business Motivation Model classes as defined in BMM-Shapes.ttl: Vision amplifiedBy Goal, Vision madeOperativeBy Mission, Goal quantifiedBy Objective, Strategy channelsEffortsToward End, Tactic implements Strategy, Business Policy governs CourseOfAction, Organization Unit isResponsibleFor End, Assessment assesses Influencer, Potential Impact providesImpetusFor Directive.</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f1f1f"/>
    </marker>
  </defs>

  <rect width="1400" height="800" fill="#ffffff"/>

  <!-- ── Boxes ────────────────────────────────────────────────── -->
  <!-- Ends (dark navy) -->
  <g>
    <rect x="560" y="40" width="240" height="56" rx="6" fill="#1a3553"/>
    <text x="680" y="76" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Vision</text>
  </g>
  <g>
    <rect x="560" y="200" width="240" height="56" rx="6" fill="#1a3553"/>
    <text x="680" y="236" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Goal</text>
  </g>
  <g>
    <rect x="560" y="360" width="240" height="56" rx="6" fill="#1a3553"/>
    <text x="680" y="396" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Objective</text>
  </g>

  <!-- Means (medium blue) -->
  <g>
    <rect x="1080" y="40" width="240" height="56" rx="6" fill="#2c7bb6"/>
    <text x="1200" y="76" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Mission</text>
  </g>
  <g>
    <rect x="40" y="200" width="240" height="56" rx="6" fill="#2c7bb6"/>
    <text x="160" y="236" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Strategy</text>
  </g>
  <g>
    <rect x="40" y="360" width="240" height="56" rx="6" fill="#2c7bb6"/>
    <text x="160" y="396" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Tactic</text>
  </g>

  <!-- Directives (purple) -->
  <g>
    <rect x="40" y="500" width="240" height="56" rx="6" fill="#8e44ad"/>
    <text x="160" y="536" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Business Policy</text>
  </g>
  <g>
    <rect x="560" y="500" width="240" height="56" rx="6" fill="#8e44ad"/>
    <text x="680" y="536" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Business Rule</text>
  </g>

  <!-- Influencers & Assessments (green) -->
  <g>
    <rect x="1080" y="200" width="240" height="56" rx="6" fill="#27ae60"/>
    <text x="1200" y="236" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Influencer</text>
  </g>
  <g>
    <rect x="1080" y="360" width="240" height="56" rx="6" fill="#27ae60"/>
    <text x="1200" y="396" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Assessment</text>
  </g>
  <g>
    <rect x="1080" y="500" width="240" height="56" rx="6" fill="#27ae60"/>
    <text x="1200" y="536" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Potential Impact</text>
  </g>

  <!-- Organization (orange) -->
  <g>
    <rect x="40" y="640" width="240" height="56" rx="6" fill="#e67e22"/>
    <text x="160" y="676" fill="#ffffff" font-size="22" font-weight="700" text-anchor="middle">Organization Unit</text>
  </g>

  <!-- ── Edges ────────────────────────────────────────────────── -->
  <g stroke="#1f1f1f" stroke-width="2" fill="none">
    <!-- Vision → Goal : amplifiedBy (vertical down) -->
    <line x1="680" y1="96" x2="680" y2="196" marker-end="url(#arrow)"/>
    <!-- Vision → Mission : madeOperativeBy (horizontal right) -->
    <line x1="800" y1="68" x2="1076" y2="68" marker-end="url(#arrow)"/>
    <!-- Goal → Objective : quantifiedBy (vertical down) -->
    <line x1="680" y1="256" x2="680" y2="356" marker-end="url(#arrow)"/>
    <!-- Strategy → Goal : channelsEffortsToward (horizontal right) -->
    <line x1="280" y1="228" x2="556" y2="228" marker-end="url(#arrow)"/>
    <!-- Tactic → Strategy : implements (vertical up) -->
    <line x1="160" y1="356" x2="160" y2="260" marker-end="url(#arrow)"/>
    <!-- Business Policy → Tactic : governs (vertical up) -->
    <line x1="160" y1="496" x2="160" y2="420" marker-end="url(#arrow)"/>
    <!-- Organization Unit → Goal : isResponsibleFor (diagonal up to Goal) -->
    <line x1="280" y1="660" x2="556" y2="240" marker-end="url(#arrow)"/>
    <!-- Assessment → Influencer : assesses (vertical up) -->
    <line x1="1200" y1="356" x2="1200" y2="260" marker-end="url(#arrow)"/>
    <!-- Potential Impact → Business Rule : providesImpetusFor (diagonal up-left) -->
    <line x1="1076" y1="528" x2="804" y2="528" marker-end="url(#arrow)"/>
  </g>

  <!-- ── Edge labels ──────────────────────────────────────────── -->
  <g font-size="16" fill="#1f1f1f">
    <!-- amplifiedBy (Vision→Goal) -->
    <text x="694" y="150" font-style="italic">amplifiedBy</text>
    <!-- madeOperativeBy (Vision→Mission) -->
    <text x="938" y="60" text-anchor="middle" font-style="italic">madeOperativeBy</text>
    <!-- quantifiedBy (Goal→Objective) -->
    <text x="694" y="310" font-style="italic">quantifiedBy</text>
    <!-- channelsEffortsToward (Strategy→Goal) -->
    <text x="418" y="220" text-anchor="middle" font-style="italic">channelsEffortsToward</text>
    <!-- implements (Tactic→Strategy) -->
    <text x="174" y="312" font-style="italic">implements</text>
    <!-- governs (Business Policy→Tactic) -->
    <text x="174" y="462" font-style="italic">governs</text>
    <!-- isResponsibleFor (OrgUnit→Goal) -->
    <text x="320" y="450" font-style="italic" transform="rotate(-56 320 450)">isResponsibleFor</text>
    <!-- assesses (Assessment→Influencer) -->
    <text x="1214" y="312" font-style="italic">assesses</text>
    <!-- providesImpetusFor (Potential Impact→Business Rule) -->
    <text x="940" y="520" text-anchor="middle" font-style="italic">providesImpetusFor</text>
  </g>

  <!-- ── Legend ───────────────────────────────────────────────── -->
  <g transform="translate(40, 740)" font-size="16" fill="#1f1f1f">
    <rect width="22" height="14" rx="3" fill="#1a3553"/>
    <text x="30" y="12">Ends</text>

    <rect x="120" width="22" height="14" rx="3" fill="#2c7bb6"/>
    <text x="150" y="12">Means</text>

    <rect x="260" width="22" height="14" rx="3" fill="#8e44ad"/>
    <text x="290" y="12">Directives</text>

    <rect x="420" width="22" height="14" rx="3" fill="#27ae60"/>
    <text x="450" y="12">Influencers &amp; Assessments</text>

    <rect x="780" width="22" height="14" rx="3" fill="#e67e22"/>
    <text x="810" y="12">Organization</text>
  </g>
</svg>
