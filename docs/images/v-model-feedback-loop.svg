<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="fa" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2c3e50"/>
    </marker>
    <marker id="ra" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#e74c3c"/>
    </marker>
  </defs>

  <!-- Layer 3 top -->
  <rect x="150" y="15" width="400" height="55" rx="8" fill="#27ae60"/>
  <text x="350" y="38" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Layer 3: LQE Analytics</text>
  <text x="350" y="56" text-anchor="middle" fill="#d5f5e3" font-size="11">Detects: gaps, coverage ratios, inconsistencies</text>

  <!-- Arrow down -->
  <line x1="350" y1="70" x2="350" y2="98" stroke="#2c3e50" stroke-width="2" marker-end="url(#fa)"/>
  <text x="395" y="88" fill="#555" font-size="11">structured findings</text>

  <!-- Layer 2 top -->
  <rect x="150" y="103" width="400" height="55" rx="8" fill="#2980b9"/>
  <text x="350" y="126" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Layer 2: OSLC Integration</text>
  <text x="350" y="144" text-anchor="middle" fill="#d6eaf8" font-size="11">Proposes: cross-tool actions, link updates</text>

  <!-- Arrow down -->
  <line x1="350" y1="158" x2="350" y2="186" stroke="#2c3e50" stroke-width="2" marker-end="url(#fa)"/>
  <text x="395" y="176" fill="#555" font-size="11">action plan</text>

  <!-- Layer 1 -->
  <rect x="150" y="191" width="400" height="55" rx="8" fill="#1a5276"/>
  <text x="350" y="214" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Layer 1: Individual Tools</text>
  <text x="350" y="232" text-anchor="middle" fill="#a9cce3" font-size="11">Authors: requirements, test cases, work items</text>

  <!-- Arrow down -->
  <line x1="350" y1="246" x2="350" y2="274" stroke="#2c3e50" stroke-width="2" marker-end="url(#fa)"/>
  <text x="405" y="264" fill="#555" font-size="11">new/updated artifacts</text>

  <!-- Layer 2 bottom -->
  <rect x="150" y="279" width="400" height="45" rx="8" fill="#2980b9"/>
  <text x="350" y="302" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Layer 2: Establish Links</text>
  <text x="350" y="318" text-anchor="middle" fill="#d6eaf8" font-size="11">Connects new artifacts into the traceability graph</text>

  <!-- Arrow down -->
  <line x1="350" y1="324" x2="350" y2="348" stroke="#2c3e50" stroke-width="2" marker-end="url(#fa)"/>

  <!-- Layer 3 bottom -->
  <rect x="150" y="353" width="400" height="40" rx="8" fill="#27ae60"/>
  <text x="350" y="378" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Layer 3: Verify Integrity</text>

  <!-- Feedback arrow: bottom Layer 3 back to top Layer 3 -->
  <path d="M 150,373 C 50,373 50,42 150,42" fill="none" stroke="#e74c3c" stroke-width="3" marker-end="url(#ra)" stroke-dasharray="8,4"/>
  <text x="55" y="195" text-anchor="middle" fill="#e74c3c" font-size="13" font-weight="bold">Feedback</text>
  <text x="55" y="212" text-anchor="middle" fill="#e74c3c" font-size="12">loop</text>

  <!-- Right side: quantified outcomes -->
  <rect x="570" y="353" width="120" height="40" rx="6" fill="#f9ebea" stroke="#e74c3c"/>
  <text x="630" y="370" text-anchor="middle" fill="#e74c3c" font-size="11" font-weight="bold">Quantified</text>
  <text x="630" y="385" text-anchor="middle" fill="#e74c3c" font-size="11">outcomes</text>
  <line x1="550" y1="373" x2="566" y2="373" stroke="#e74c3c" stroke-width="1.5" marker-end="url(#ra)"/>
</svg>
