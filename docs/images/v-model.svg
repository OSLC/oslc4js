<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 340" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="va" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2980b9"/>
    </marker>
  </defs>

  <!-- Left side boxes (requirements) -->
  <rect x="30" y="20" width="210" height="38" rx="6" fill="#1a5276"/>
  <text x="135" y="44" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Stakeholder Needs</text>

  <rect x="80" y="85" width="210" height="38" rx="6" fill="#1a5276"/>
  <text x="185" y="109" text-anchor="middle" fill="white" font-size="13" font-weight="bold">System Requirements</text>

  <rect x="130" y="150" width="210" height="38" rx="6" fill="#1a5276"/>
  <text x="235" y="174" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Subsystem Requirements</text>

  <rect x="180" y="215" width="210" height="38" rx="6" fill="#1a5276"/>
  <text x="285" y="239" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Component Requirements</text>

  <!-- Right side boxes (verification) -->
  <rect x="510" y="20" width="210" height="38" rx="6" fill="#27ae60"/>
  <text x="615" y="44" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Acceptance Tests</text>

  <rect x="460" y="85" width="210" height="38" rx="6" fill="#27ae60"/>
  <text x="565" y="109" text-anchor="middle" fill="white" font-size="13" font-weight="bold">System Tests</text>

  <rect x="410" y="150" width="210" height="38" rx="6" fill="#27ae60"/>
  <text x="515" y="174" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Integration Tests</text>

  <rect x="360" y="215" width="210" height="38" rx="6" fill="#27ae60"/>
  <text x="465" y="239" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Unit Tests</text>

  <!-- Horizontal traceability arrows -->
  <line x1="240" y1="39" x2="505" y2="39" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#va)"/>
  <line x1="505" y1="39" x2="245" y2="39" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="375" y="33" text-anchor="middle" fill="#2980b9" font-size="10">validatedBy</text>

  <line x1="290" y1="104" x2="455" y2="104" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#va)"/>
  <text x="375" y="98" text-anchor="middle" fill="#2980b9" font-size="10">validatedBy</text>

  <line x1="340" y1="169" x2="405" y2="169" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3" marker-end="url(#va)"/>
  <text x="375" y="163" text-anchor="middle" fill="#2980b9" font-size="10">validatedBy</text>

  <line x1="390" y1="234" x2="355" y2="234" stroke="#2980b9" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="375" y="228" text-anchor="middle" fill="#2980b9" font-size="10">validatedBy</text>

  <!-- Bottom: Design & Implementation -->
  <rect x="250" y="280" width="250" height="38" rx="6" fill="#8e44ad"/>
  <text x="375" y="304" text-anchor="middle" fill="white" font-size="13" font-weight="bold">Design &amp; Implementation</text>

  <!-- V-shape downward arrows -->
  <line x1="285" y1="253" x2="310" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#va)"/>
  <line x1="465" y1="253" x2="440" y2="275" stroke="#555" stroke-width="1.5" marker-end="url(#va)"/>

  <!-- Legend -->
  <rect x="30" y="300" width="14" height="14" rx="3" fill="#1a5276"/>
  <text x="50" y="312" fill="#333" font-size="11">Requirements (left side)</text>
  <rect x="210" y="300" width="14" height="14" rx="3" fill="#27ae60"/>
  <text x="230" y="312" fill="#333" font-size="11">Verification (right side)</text>
  <text x="410" y="312" fill="#2980b9" font-size="11">- - - OSLC typed links (oslc_rm:validatedBy)</text>
</svg>
