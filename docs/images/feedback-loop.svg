<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 440" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2c3e50"/>
    </marker>
  </defs>

  <!-- Layer 1: Define -->
  <rect x="180" y="15" width="340" height="50" rx="8" fill="#1a5276"/>
  <text x="350" y="36" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Layer 1: Define</text>
  <text x="350" y="54" text-anchor="middle" fill="#a9cce3" font-size="12">Vocabulary &amp; ResourceShapes keep the loop coherent</text>

  <!-- Arrow down -->
  <line x1="350" y1="65" x2="350" y2="90" stroke="#2c3e50" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 2: Instantiate -->
  <rect x="180" y="95" width="340" height="50" rx="8" fill="#2980b9"/>
  <text x="350" y="116" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Layer 2: Instantiate</text>
  <text x="350" y="134" text-anchor="middle" fill="#d6eaf8" font-size="12">OSLC Server — governed resources &amp; links</text>

  <!-- Arrow down -->
  <line x1="350" y1="145" x2="350" y2="170" stroke="#2c3e50" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Layer 3: Activate -->
  <rect x="180" y="175" width="340" height="50" rx="8" fill="#27ae60"/>
  <text x="350" y="196" text-anchor="middle" fill="white" font-size="15" font-weight="bold">Layer 3: Activate</text>
  <text x="350" y="214" text-anchor="middle" fill="#d5f5e3" font-size="12">MCP / LQE — analytics, AI reasoning, tool views</text>

  <!-- AI creates label -->
  <rect x="545" y="88" width="140" height="40" rx="6" fill="#f0f0f0" stroke="#bbb"/>
  <text x="615" y="104" text-anchor="middle" fill="#333" font-size="11">AI creates, links,</text>
  <text x="615" y="118" text-anchor="middle" fill="#333" font-size="11">validates via MCP</text>
  <line x1="545" y1="108" x2="525" y2="115" stroke="#2c3e50" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- AI consumes label -->
  <rect x="545" y="168" width="140" height="40" rx="6" fill="#f0f0f0" stroke="#bbb"/>
  <text x="615" y="184" text-anchor="middle" fill="#333" font-size="11">AI consumes graph,</text>
  <text x="615" y="198" text-anchor="middle" fill="#333" font-size="11">derives insight</text>
  <line x1="525" y1="195" x2="545" y2="190" stroke="#2c3e50" stroke-width="1.5"/>

  <!-- Feedback arrow: Layer 3 back to Layer 2 -->
  <path d="M 180,200 C 100,200 100,120 180,120" fill="none" stroke="#e74c3c" stroke-width="2.5" marker-end="url(#arr)" stroke-dasharray="6,3"/>
  <text x="80" y="165" text-anchor="middle" fill="#e74c3c" font-size="12" font-weight="bold">Feedback</text>
  <text x="80" y="180" text-anchor="middle" fill="#e74c3c" font-size="11">loop</text>
</svg>
