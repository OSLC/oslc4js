services:
  fuseki:
    image: stain/jena-fuseki:latest
    container_name: fuseki
    ports:
      - "127.0.0.1:3030:3030"
      # - "[::1]:3030:3030"
    environment:
      - ADMIN_PASSWORD=admin
    volumes:
      - ../fuseki:/fuseki
    restart: unless-stopped

  bmm-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bmm-server
    ports:
      - "127.0.0.1:3005:3005"
      # - "[::1]:3005:3005"
    environment:
      - JENA_URL=http://fuseki:3030/bmm/
      - HOST=0.0.0.0
    depends_on:
      - fuseki
    restart: unless-stopped
